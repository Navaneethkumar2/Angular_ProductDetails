<p>products works!</p>
<div class="row">
    <div class="col-md-6" *ngFor="let p of products">

        <a (click)="openDetails(p.districtId)">
        <div class="card">
            <div class="card-header">
                <img [src]="p.districtImage" alt="" height="200" width="350">
                <h3 class="card-title">{{p.districtName}} District</h3>
            </div>
            <div class="card-body">
                <p>Population : {{p.districtPopulation}}</p>
                <p class="badge bg-warning">Crop : {{p.districtCrop}}</p>
            </div>
            <!-- <div class="card-footer">
                <button class="btn btn-primary">Buy Now</button>
            </div> -->
        </div>
        </a>
    </div>
</div>
