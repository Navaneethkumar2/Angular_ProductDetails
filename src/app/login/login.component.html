<p>login works!</p>


<div class="container-fluid">
    <div class="row">
           <div class="col-md-6"></div>
        <div class="col-md-6">
          
            <form action="" (ngSubmit)="checkLogin()" ngNativeValidate>
                 
                <div class="form-group">
                    <label class="form-label">Username </label>
                    <input class="form-control"  type="text" required name="username" [(ngModel)]="username">
                </div>
               

                 <div class="form-group">
                    <label class="form-label"> Password</label>
                    <input class="form-control" type="password" required name="password" [(ngModel)]="password">

                </div>

                <div class="form-check py-3">
                    <button class="btn btn-primary" type="submit">Submit</button>
                    <button class="btn btn-primary ms-3" type="reset">Cancel</button>
                </div>



            </form>

        </div>

    </div>
</div>
